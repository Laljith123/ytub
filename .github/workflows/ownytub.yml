name: ownytub-shorts

on:
  workflow_dispatch:
  schedule:
    # 🌅 Morning window (1–7 AM IST → 19–1 UTC)
    - cron: "0 19-23 * * *"
    - cron: "0 0-1 * * *"

    # 🌇 Evening window (2–7 PM IST → 8–13 UTC)
    - cron: "0 8-13 * * *"

jobs:
  build-and-upload:
    runs-on: windows-latest
    timeout-minutes: 360
    env:
      YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache TTS Models
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.local\share\tts
            C:\Users\runneradmin\AppData\Local\tts
          key: ${{ runner.os }}-tts-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-tts-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write yt-dlp Cookies
        if: ${{ env.YTDLP_COOKIES_B64 }}
        shell: pwsh
        env:
          YTDLP_COOKIES_B64: ${{ env.YTDLP_COOKIES_B64 }}
        run: |
          $cookiesPath = "${{ github.workspace }}\yt-dlp-cookies.txt"
          [IO.File]::WriteAllBytes($cookiesPath, [Convert]::FromBase64String($env:YTDLP_COOKIES_B64))
          "YTDLP_COOKIES=$cookiesPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Use Edge cookies (self-hosted fallback)
        if: ${{ !env.YTDLP_COOKIES_B64 }}
        shell: pwsh
        run: |
          "YTDLP_COOKIES_FROM_BROWSER=edge" | Out-File -FilePath $env:GITHUB_ENV -Append

      # 🎲 Always run, but randomize how many to generate (>=1)
      - name: Random Generate Count
        shell: pwsh
        run: |
          $min = 1
          $max = 5
          $random = Get-Random -Minimum $min -Maximum ($max + 1)
          echo "RUN_PIPELINE=1" >> $env:GITHUB_ENV
          echo "GENERATE_COUNT=$random" >> $env:GITHUB_ENV
          echo "Generate count set to: $random"

      # 🎯 Random upload limit (2–5)
      - name: Set Random Upload Limits
        if: env.RUN_PIPELINE == '1'
        shell: pwsh
        run: |
          $min = 2
          $max = 5
          $random = Get-Random -Minimum $min -Maximum ($max + 1)

          echo "YOUTUBE_UPLOADS_PER_DAY=$random" >> $env:GITHUB_ENV
          echo "YOUTUBE_MAX_SUCCESS=$random" >> $env:GITHUB_ENV

          echo "Random upload limit set to: $random"

      - name: Run Pipeline + Upload
        if: env.RUN_PIPELINE == '1'
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          VOICE: "RIVA"
          RIVA_VOICE: "Magpie-Multilingual.EN-US.Aria"
          RIVA_LANGUAGE: "en-US"
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_HISTORY_ENABLED: "1"
          YOUTUBE_HISTORY_LIMIT: "200"
          YOUTUBE_HISTORY_PROMPT_LIMIT: "40"
          UPLOAD_QUEUE_DIR: ${{ github.workspace }}\output\queue
          THUMBNAIL_PATH: ${{ github.workspace }}\output\thumbnail.jpg
          YOUTUBE_TOKEN_FILE: ${{ github.workspace }}\output\youtube_token.json
          RUN_UPLOAD: "1"
          UPLOAD_EACH: "1"
          YOUTUBE_LOOP: "0"
          VIDEO_MIN_SECONDS: "40"
          VIDEO_MAX_SECONDS: "50"
          VIDEO_CLIP_SECONDS: "5"
          VIDEO_WIDTH: "1080"
          VIDEO_HEIGHT: "1920"
          SUBTITLE_RES_X: "1080"
          SUBTITLE_RES_Y: "1920"
          SUBTITLE_POS_Y: "960"
          VOICE_SPEED: "1.25"
          VOICE_GAIN_DB: "-3"
          COQUI_TOS_AGREED: "1"
          THUMBNAIL_SOURCE: "image"
          NVIDIA_IMAGE_RETRIES: "10"
          NVIDIA_IMAGE_RETRY_BACKOFF: "3"
          NVIDIA_IMAGE_DELAY: "3"
          CONTENT_ENABLE_THINKING: "1"
          CONTENT_STREAM: "0"
          TRENDS_USE_PYTRENDS: "0"
          YTDLP_JS_RUNTIME: "node"
          YTDLP_PLAYER_CLIENT: "web"
          YTDLP_REMOTE_COMPONENTS: "ejs:github"
          BACKGROUND_MUSIC_GAIN: "1.6"
          BACKGROUND_MUSIC_VOLUME: "0.25"
          # Shared AI config
          CONTENT_MODEL: "openai/gpt-oss-120b"
          NVIDIA_BASE_URL: "https://integrate.api.nvidia.com/v1"

          # Content.py new fields / retention config
          CONTENT_MAX_ATTEMPTS: "3"
          CONTENT_TITLE_MAX_CHARS: "80"
          CONTENT_HOOK_MAX_WORDS: "18"
          CONTENT_CAPTION_MAX_CHARS: "220"
          CONTENT_THUMBNAIL_TEXT_MAX_WORDS: "5"
          CONTENT_HASHTAG_MIN_COUNT: "8"
          CONTENT_HASHTAG_MAX_COUNT: "15"
          CONTENT_RETENTION_TRIGGER_MIN_COUNT: "3"
          CONTENT_RETENTION_TRIGGER_MAX_COUNT: "6"

          # Voice.py RIVA voice-plan config
          VOICE_PLAN_ENABLED: "1"
          VOICE_PLAN_MODEL: "openai/gpt-oss-120b"
          VOICE_PLAN_BASE_URL: "https://integrate.api.nvidia.com/v1"
          VOICE_PLAN_MAX_ATTEMPTS: "3"
          VOICE_PLAN_MAX_TOKENS: "4096"
          VOICE_PLAN_TEMPERATURE: "0.35"
          VOICE_PLAN_TOP_P: "0.9"
          VOICE_PLAN_ENABLE_THINKING: "1"
          VOICE_PLAN_REASONING_BUDGET: "4096"
          VOICE_PLAN_MIN_SPEED_MULTIPLIER: "0.82"
          VOICE_PLAN_MAX_SPEED_MULTIPLIER: "1.12"
          VOICE_PLAN_MIN_GAIN_DB: "-2.5"
          VOICE_PLAN_MAX_GAIN_DB: "2.5"
          VOICE_PLAN_MIN_PAUSE_MS: "0"
          VOICE_PLAN_MAX_PAUSE_MS: "700"
          VOICE_SFX_ENABLED: "0"

          # RIVA details
          RIVA_URI: "grpc.nvcf.nvidia.com:443"
          RIVA_FUNCTION_ID: "877104f7-e885-42b9-8de8-f6e4c6303969"
          RIVA_SAMPLE_RATE_HZ: "44100"
          RIVA_USE_SSL: "1"

          # Thumbnail.py AI planner config
          THUMBNAIL_PLAN_ENABLED: "1"
          THUMBNAIL_PLAN_MODEL: "openai/gpt-oss-120b"
          THUMBNAIL_PLAN_BASE_URL: "https://integrate.api.nvidia.com/v1"
          THUMBNAIL_PLAN_MAX_ATTEMPTS: "3"
          THUMBNAIL_PLAN_MAX_TOKENS: "2048"
          THUMBNAIL_PLAN_REASONING_BUDGET: "2048"
          THUMBNAIL_PLAN_TEMPERATURE: "0.35"
          THUMBNAIL_PLAN_TOP_P: "0.9"
          THUMBNAIL_PLAN_ENABLE_THINKING: "1"
          THUMBNAIL_PLAN_PICK_IMAGE: "1"
          THUMBNAIL_PLAN_USE_POSITION: "1"
          THUMBNAIL_PLAN_TEXT_MAX_WORDS: "4"
          THUMBNAIL_PLAN_SUBTEXT_MAX_WORDS: "4"
          THUMBNAIL_PLAN_FIELD: "thumbnail_text"
          THUMBNAIL_UPPERCASE: "1"

          # Trend.py collector + AI judge config
          TRENDS_USE_GOOGLE_NEWS: "1"
          TRENDS_USE_YOUTUBE_SUGGEST: "1"
          TRENDS_USE_AI_JUDGE: "1"
          TRENDS_KEYWORD_SAMPLE: "8"
          TRENDS_KEYWORD_MODE: "random"
          TRENDS_NEWS_LIMIT_PER_KEYWORD: "8"
          TRENDS_YT_SUGGEST_LIMIT_PER_KEYWORD: "10"
          TRENDS_AI_MODEL: "openai/gpt-oss-120b"
          TRENDS_AI_BASE_URL: "https://integrate.api.nvidia.com/v1"
          TRENDS_AI_MAX_ATTEMPTS: "3"
          TRENDS_AI_MAX_TOKENS: "4096"
          TRENDS_AI_TEMPERATURE: "0.25"
          TRENDS_AI_TOP_P: "0.9"
          TRENDS_AI_ENABLE_THINKING: "1"
          TRENDS_AI_REASONING_BUDGET: "4096"
          TRENDS_AI_CANDIDATE_LIMIT: "60"
          TRENDS_SELECTED_COUNT: "5"
          TRENDS_COLLISION_SIM: "0.72"
          TRENDS_USED_PROMPT_LIMIT: "120"
          TRENDS_AI_REQUIRE_SOURCE_MATCH: "1"
          OUTPUT_JSON_PATH: ${{ github.workspace }}\output.json
        run: python pipeline.py
