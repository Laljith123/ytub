name: ownytub-shorts

on:
  workflow_dispatch:
  schedule:
    # 🌅 Morning window (1–7 AM IST → 19–1 UTC)
    - cron: "0 19-23 * * *"
    - cron: "0 0-1 * * *"

    # 🌇 Evening window (2–7 PM IST → 8–13 UTC)
    - cron: "0 8-13 * * *"

permissions:
  contents: write

concurrency:
  group: ownytub-shorts
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Generation Secrets
        shell: pwsh
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          FREETHEAI_API_KEY: ${{ secrets.FREETHEAI_API_KEY }}
          CAMB_API_KEY: ${{ secrets.CAMB_API_KEY }}
        run: |
          if (-not $env:NVIDIA_API_KEY) {
            throw "Missing GitHub secret NVIDIA_API_KEY. Text generation now uses NVIDIA Nemotron."
          }
          if (-not $env:FREETHEAI_API_KEY) {
            echo "::warning::Missing GitHub secret FREETHEAI_API_KEY. FreeTheAi image/TTS will be skipped unless another fallback provider is configured."
          }
          if (-not $env:CAMB_API_KEY) {
            echo "::warning::Missing GitHub secret CAMB_API_KEY. Voice will use FreeTheAi if configured, then Edge TTS."
          } else {
            echo "NVIDIA_API_KEY and CAMB_API_KEY are configured. Text uses NVIDIA Nemotron; voice order is FreeTheAi, CAMB, then Edge TTS."
          }

      # 🎲 Always run, but randomize how many to generate (>=1)
      - name: Random Generate Count
        shell: pwsh
        run: |
          $min = 1
          $max = 5
          $random = Get-Random -Minimum $min -Maximum ($max + 1)
          echo "RUN_PIPELINE=1" >> $env:GITHUB_ENV
          echo "GENERATE_COUNT=$random" >> $env:GITHUB_ENV
          echo "Generate count set to: $random"

      # 🎯 Random upload limit (2–5)
      - name: Set Random Upload Limits
        if: env.RUN_PIPELINE == '1'
        shell: pwsh
        run: |
          $min = 1
          $max = 1
          $random = Get-Random -Minimum $min -Maximum ($max + 1)

          echo "YOUTUBE_UPLOADS_PER_DAY=$random" >> $env:GITHUB_ENV
          echo "YOUTUBE_MAX_SUCCESS=$random" >> $env:GITHUB_ENV

          echo "Random upload limit set to: $random"

      - name: Run Pipeline + Upload
        if: env.RUN_PIPELINE == '1'
        env:
          FREETHEAI_API_KEY: ${{ secrets.FREETHEAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CAMB_API_KEY: ${{ secrets.CAMB_API_KEY }}
          JSON_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          JSON_BASE_URL: ${{ vars.JSON_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
          JSON_MODEL: ${{ vars.JSON_MODEL || 'nvidia/nemotron-3-ultra-550b-a55b' }}
          JSON_MODEL_DISCOVERY_ENABLED: "0"
          JSON_EXTRA_BODY_ENABLED: ${{ vars.JSON_EXTRA_BODY_ENABLED }}
          JSON_COMPLETION_TIMEOUT: "240"
          NVIDIA_JSON_RPM_LIMIT: "40"
          NVIDIA_JSON_MAX_ATTEMPTS: "3"
          NVIDIA_JSON_RETRY_WAIT_SECONDS: "20"
          FREETHEAI_RPM_LIMIT: "10"
          RATE_LIMIT_CUSHION_SECONDS: "12"
          FREETHEAI_MAX_ATTEMPTS: "4"
          VOICE: "FreeTheAi"
          TTS_BACKEND: "freetheai"
          TTS_FALLBACK_BACKENDS: "camb,edge"
          FREETHEAI_TTS_MODEL: ${{ vars.FREETHEAI_TTS_MODEL || 'xai/grok-tts' }}
          FREETHEAI_TTS_VOICE: ${{ vars.FREETHEAI_TTS_VOICE || 'default' }}
          FREETHEAI_TTS_RESPONSE_FORMAT: "wav"
          FREETHEAI_TTS_TIMEOUT: "180"
          FREETHEAI_TTS_MAX_ATTEMPTS: "4"
          FREETHEAI_TTS_INSTRUCTIONS: ${{ vars.FREETHEAI_TTS_INSTRUCTIONS || 'Speak like a calm friend explaining an interesting real topic. Keep it continuous, natural, and easy to understand. Use a brisk but clear pace with tiny human pauses, never a news-reader tone.' }}
          CAMB_LANGUAGE: "en-us"
          CAMB_VOICE_ID: ${{ vars.CAMB_VOICE_ID }}
          CAMB_SPEECH_MODEL: ${{ vars.CAMB_SPEECH_MODEL }}
          CAMB_SPEAKING_RATE: ${{ vars.CAMB_SPEAKING_RATE || '1.04' }}
          CAMB_USER_INSTRUCTIONS: ${{ vars.CAMB_USER_INSTRUCTIONS || 'Sound like a calm friend explaining an interesting real topic. Keep the delivery continuous and human, with only tiny natural pauses. Speak at a brisk but clear pace, and do not drag the pacing.' }}
          EDGE_TTS_VOICE: "en-US-GuyNeural"
          EDGE_TTS_RATE: ${{ vars.EDGE_TTS_RATE || '+8%' }}
          EDGE_TTS_VOLUME: "+0%"
          EDGE_TTS_PITCH: "-2Hz"
          RIVA_VOICE: "English-US-RadTTS.Female-1"
          RIVA_LANGUAGE: "en-US"
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_HISTORY_ENABLED: "1"
          YOUTUBE_HISTORY_LIMIT: "200"
          YOUTUBE_HISTORY_PROMPT_LIMIT: "20"
          UPLOAD_QUEUE_DIR: ${{ github.workspace }}\output\queue
          THUMBNAIL_PATH: ${{ github.workspace }}\output\thumbnail.jpg
          YOUTUBE_TOKEN_FILE: ${{ github.workspace }}\output\youtube_token.json
          HISTORY_JSON_PATH: ${{ github.workspace }}\generating\history.json
          UPLOAD_HISTORY_FILE: ${{ github.workspace }}\generating\history.json
          SAVE_UPLOAD_HISTORY: "1"
          YOUTUBE_TAGS: "${{ vars.YOUTUBE_TAGS || 'shorts,ytshorts,youtubeshorts,shortsvideo,viral,trending,explained,story,interesting,documentary,learnsomething,newfacts,curiosity' }}"
          YOUTUBE_HASHTAGS: "${{ vars.YOUTUBE_HASHTAGS || '#shorts #ytshorts #youtubeshorts #shortsvideo #viral #trending #explained #interesting #facts #curiosity' }}"
          CLEAN_OUTPUT_AFTER_UPLOAD: "1"
          CLEAN_OUTPUT_JSON_AFTER_UPLOAD: "1"
          PERSIST_HISTORY_FILES: ${{ github.workspace }}\generating\history.json
          RUN_UPLOAD: "1"
          UPLOAD_EACH: "1"
          YOUTUBE_LOOP: "0"
          VIDEO_MIN_SECONDS: "40"
          VIDEO_MAX_SECONDS: "50"
          VIDEO_CLIP_SECONDS: "5"
          VIDEO_WIDTH: "1080"
          VIDEO_HEIGHT: "1920"
          SUBTITLE_RES_X: "1080"
          SUBTITLE_RES_Y: "1920"
          SUBTITLE_POS_Y: "960"
          VOICE_SPEED: ${{ vars.VOICE_SPEED || '1.08' }}
          VOICE_GAIN_DB: "0"
          VOICE_CROSSFADE_MS: "45"
          VOICE_DEFAULT_PAUSE_MS: ${{ vars.VOICE_DEFAULT_PAUSE_MS || '75' }}
          VOICE_PAUSE_VARIATION_MS: ${{ vars.VOICE_PAUSE_VARIATION_MS || '35' }}
          VOICE_FINAL_PAUSE_MS: ${{ vars.VOICE_FINAL_PAUSE_MS || '190' }}
          THUMBNAIL_SOURCE: "image"
          NVIDIA_IMAGE_RETRIES: "10"
          NVIDIA_IMAGE_RETRY_BACKOFF: "3"
          NVIDIA_IMAGE_DELAY: "3"
          IMAGE_BACKEND_ORDER: "freetheai,nvidia"
          FREETHEAI_IMAGE_MODEL: ${{ vars.FREETHEAI_IMAGE_MODEL || 'img/gpt-image-2' }}
          FREETHEAI_IMAGE_SIZE: ${{ vars.FREETHEAI_IMAGE_SIZE || '1024x1536' }}
          FREETHEAI_IMAGE_RESPONSE_FORMAT: "b64_json"
          FREETHEAI_IMAGE_TIMEOUT: "240"
          FREETHEAI_IMAGE_RETRIES: "3"
          FREETHEAI_IMAGE_PROMPT_PREFIX: "Create a cinematic, safe, non-graphic vertical YouTube Shorts image. No readable text, no logos, no gore."
          CONTENT_ENABLE_THINKING: "1"
          CONTENT_STREAM: "1"
          TRENDS_USE_PYTRENDS: "0"
          BACKGROUND_MUSIC_ENABLED: "1"
          BACKGROUND_MUSIC_GAIN: "1.6"
          BACKGROUND_MUSIC_VOLUME: "0.16"
          OPENVERSE_MUSIC_LICENSES: "cc0,by"
          OPENVERSE_MUSIC_MIN_SECONDS: "30"
          OPENVERSE_MUSIC_MAX_SECONDS: "600"
          OPENVERSE_MUSIC_PAGE_SIZE: "20"
          OPENVERSE_MUSIC_PAGES: "3"
          # NVIDIA Nemotron JSON prompt config.
          CONTENT_BASE_URL: ${{ vars.CONTENT_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
          CONTENT_MODEL: ${{ vars.CONTENT_MODEL || 'nvidia/nemotron-3-ultra-550b-a55b' }}
          NVIDIA_BASE_URL: "https://integrate.api.nvidia.com/v1"

          # Content.py new fields / retention config
          CONTENT_API_ENABLED: ${{ vars.CONTENT_API_ENABLED || '1' }}
          CONTENT_TOPIC_PROFILE: ${{ vars.CONTENT_TOPIC_PROFILE || 'a fully dynamic YouTube Shorts channel that turns real, source-backed trends into natural friend-style explainers' }}
          CONTENT_MAX_ATTEMPTS: "3"
          CONTENT_MAX_TOKENS: "16384"
          CONTENT_TEMPERATURE: "1"
          CONTENT_TOP_P: "0.95"
          CONTENT_REASONING_BUDGET: "16384"
          CONTENT_USED_PROMPT_LIMIT: "60"
          CONTENT_LOCAL_FALLBACK_ENABLED: "0"
          CONTENT_TITLE_MAX_CHARS: "80"
          CONTENT_HOOK_MAX_WORDS: "18"
          CONTENT_CAPTION_MAX_CHARS: "220"
          CONTENT_THUMBNAIL_TEXT_MAX_WORDS: "5"
          CONTENT_HASHTAG_MIN_COUNT: "8"
          CONTENT_HASHTAG_MAX_COUNT: "15"
          CONTENT_RETENTION_TRIGGER_MIN_COUNT: "3"
          CONTENT_RETENTION_TRIGGER_MAX_COUNT: "6"

          # Voice.py Riva voice-plan config
          VOICE_PLAN_ENABLED: "0"
          VOICE_PLAN_MODEL: ${{ vars.VOICE_PLAN_MODEL || 'nvidia/nemotron-3-ultra-550b-a55b' }}
          VOICE_PLAN_BASE_URL: ${{ vars.VOICE_PLAN_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
          VOICE_PLAN_MAX_ATTEMPTS: "3"
          VOICE_PLAN_MAX_TOKENS: "16384"
          VOICE_PLAN_TEMPERATURE: "1"
          VOICE_PLAN_TOP_P: "0.95"
          VOICE_PLAN_ENABLE_THINKING: "1"
          VOICE_PLAN_REASONING_BUDGET: "16384"
          VOICE_PLAN_MIN_SPEED_MULTIPLIER: "1"
          VOICE_PLAN_MAX_SPEED_MULTIPLIER: "1.2"
          VOICE_PLAN_MIN_GAIN_DB: "-2.5"
          VOICE_PLAN_MAX_GAIN_DB: "2.5"
          VOICE_PLAN_MIN_PAUSE_MS: "0"
          VOICE_PLAN_MAX_PAUSE_MS: "700"
          VOICE_SFX_ENABLED: "0"

          # Riva RadTTS API details
          RIVA_URI: "grpc.nvcf.nvidia.com:443"
          RIVA_FUNCTION_ID: "5e607c81-7aa6-44ce-a11d-9e08f0a3fe49"
          RIVA_SAMPLE_RATE_HZ: "22050"
          RIVA_USE_SSL: "1"

          # Thumbnail.py AI planner config
          THUMBNAIL_PLAN_ENABLED: "1"
          THUMBNAIL_PLAN_MODEL: ${{ vars.THUMBNAIL_PLAN_MODEL || 'nvidia/nemotron-3-ultra-550b-a55b' }}
          THUMBNAIL_PLAN_BASE_URL: ${{ vars.THUMBNAIL_PLAN_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
          THUMBNAIL_PLAN_MAX_ATTEMPTS: "3"
          THUMBNAIL_PLAN_MAX_TOKENS: "16384"
          THUMBNAIL_PLAN_REASONING_BUDGET: "16384"
          THUMBNAIL_PLAN_TEMPERATURE: "1"
          THUMBNAIL_PLAN_TOP_P: "0.95"
          THUMBNAIL_PLAN_ENABLE_THINKING: "1"
          THUMBNAIL_PLAN_PICK_IMAGE: "1"
          THUMBNAIL_PLAN_USE_POSITION: "1"
          THUMBNAIL_PLAN_TEXT_MAX_WORDS: "4"
          THUMBNAIL_PLAN_SUBTEXT_MAX_WORDS: "4"
          THUMBNAIL_PLAN_FIELD: "thumbnail_text"
          THUMBNAIL_UPPERCASE: "1"

          # Trend.py collector + AI judge config
          TRENDS_USE_GOOGLE_NEWS: "1"
          TRENDS_USE_YOUTUBE_SUGGEST: "1"
          TRENDS_USE_AI_JUDGE: "1"
          TRENDS_TOPIC_MODE: ${{ vars.TRENDS_TOPIC_MODE || 'dynamic' }}
          TRENDS_CHANNEL_PROFILE: ${{ vars.TRENDS_CHANNEL_PROFILE || 'a fully dynamic YouTube Shorts channel that explains real, source-backed trends across categories' }}
          TRENDS_KEYWORD_SAMPLE: "8"
          TRENDS_KEYWORD_MODE: "random"
          TRENDS_NEWS_LIMIT_PER_KEYWORD: "8"
          TRENDS_YT_SUGGEST_LIMIT_PER_KEYWORD: "10"
          TRENDS_AI_MODEL: ${{ vars.TRENDS_AI_MODEL || 'nvidia/nemotron-3-ultra-550b-a55b' }}
          TRENDS_AI_BASE_URL: ${{ vars.TRENDS_AI_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
          TRENDS_AI_MAX_ATTEMPTS: "3"
          TRENDS_AI_MAX_TOKENS: "16384"
          TRENDS_AI_TEMPERATURE: "1"
          TRENDS_AI_TOP_P: "0.95"
          TRENDS_AI_ENABLE_THINKING: "1"
          TRENDS_AI_REASONING_BUDGET: "16384"
          TRENDS_AI_CANDIDATE_LIMIT: "30"
          TRENDS_SELECTED_COUNT: "5"
          TRENDS_COLLISION_SIM: "0.72"
          TRENDS_USED_PROMPT_LIMIT: "120"
          TRENDS_AI_REQUIRE_SOURCE_MATCH: "1"
          OUTPUT_JSON_PATH: ${{ github.workspace }}\output.json
          #youtube
          YOUTUBE_METADATA_AI_ENABLED: "1"
          YOUTUBE_METADATA_MODEL: ${{ vars.YOUTUBE_METADATA_MODEL || 'nvidia/nemotron-3-ultra-550b-a55b' }}
          YOUTUBE_METADATA_BASE_URL: ${{ vars.YOUTUBE_METADATA_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
          YOUTUBE_METADATA_MAX_ATTEMPTS: "3"
          YOUTUBE_METADATA_MAX_TOKENS: "16384"
          YOUTUBE_METADATA_TEMPERATURE: "1"
          YOUTUBE_METADATA_TOP_P: "0.95"
          YOUTUBE_METADATA_ENABLE_THINKING: "1"
          YOUTUBE_METADATA_REASONING_BUDGET: "16384"
          YOUTUBE_METADATA_TITLE_MAX_CHARS: "75"
          YOUTUBE_METADATA_DESCRIPTION_MAX_CHARS: "1200"
          YOUTUBE_METADATA_TAG_MIN_COUNT: "8"
          YOUTUBE_METADATA_TAG_MAX_COUNT: "15"
          YOUTUBE_METADATA_HASHTAG_MIN_COUNT: "8"
          YOUTUBE_METADATA_HASHTAG_MAX_COUNT: "15"
        run: python pipeline.py

      - name: Persist Upload History
        if: env.RUN_PIPELINE == '1'
        shell: pwsh
        run: |
          if (-not (Test-Path "generating/history.json")) {
            echo "No upload history file found."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generating/history.json

          if (git diff --cached --quiet) {
            echo "No upload history changes to commit."
            exit 0
          }

          git commit -m "Update upload history"
          git pull --rebase
          git push
