name: ownytub-shorts

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  build-and-upload:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache TTS Models
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.local\share\tts
            C:\Users\runneradmin\AppData\Local\tts
          key: ${{ runner.os }}-tts-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-tts-

      - name: Run Pipeline + Upload
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          RUN_UPLOAD: "5"
          YOUTUBE_UPLOADS_PER_DAY: "10"
          YOUTUBE_LOOP: "0"
          YOUTUBE_MAX_SUCCESS: "10"
          GENERATE_COUNT: "10"
          VIDEO_MIN_SECONDS: "40"
          VIDEO_MAX_SECONDS: "50"
          VIDEO_CLIP_SECONDS: "5"
          VIDEO_WIDTH: "1080"
          VIDEO_HEIGHT: "1920"
          SUBTITLE_RES_X: "1080"
          SUBTITLE_RES_Y: "1920"
          SUBTITLE_POS_Y: "960"
          VOICE_SPEED: "1.25"
          COQUI_TOS_AGREED: "1"
          THUMBNAIL_SOURCE: "image"
          NVIDIA_IMAGE_RETRIES: "10"
          NVIDIA_IMAGE_RETRY_BACKOFF: "3"
          NVIDIA_IMAGE_DELAY: "3"
          CONTENT_ENABLE_THINKING: "1"
          CONTENT_STREAM: "0"
          TRENDS_USE_PYTRENDS: "0"
        run: python pipeline.py
